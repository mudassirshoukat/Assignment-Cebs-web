<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="card my-5">
        <div class="card-body">
          <a href="#" class="d-flex justify-content-center">
    <img src="assets/images/logo-brand.png" style="width: 300px;" alt="darkMode-logo" class="logo" />
          </a>
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="row">
              <div class="d-flex justify-content-center">
                <div class="auth-header">
                  <h2 class="text-secondary mt-5"><b>Hi, Welcome Back</b></h2>
                  <p class="fs-4 mt-2">Enter your credentials to continue</p>
                </div>
              </div>
            </div>
         
            <div class="form-floating mb-3">
              <input
                type="email"
                class="form-control"
                id="floatingInput"
                formControlName="email"
                placeholder="Email address / Username"
                [ngClass]="{'is-invalid': f['email'].invalid && (f['email'].dirty || f['email'].touched)}"
              />
              <label for="floatingInput">Email address / Username</label>
              <div *ngIf="f['email'].invalid && (f['email'].dirty || f['email'].touched)" class="invalid-feedback">
                <div *ngIf="f['email'].errors?.['required']">Email is required.</div>
                <div *ngIf="f['email'].errors?.['email']">Enter a valid email address.</div>
              </div>
            </div>

            <div class="form-floating mb-3">
              <input
                type="password"
                class="form-control"
                id="password"
                formControlName="password"
                placeholder="Password"
                [ngClass]="{'is-invalid': f['password'].invalid && (f['password'].dirty || f['password'].touched)}"
              />
              <label for="password">Password</label>
              <div *ngIf="f['password'].invalid && (f['password'].dirty || f['password'].touched)" class="invalid-feedback">
                <div *ngIf="f['password'].errors?.['required']">Password is required.</div>
                <div *ngIf="f['password'].errors?.['minlength']">Password must be at least 5 characters.</div>
              </div>
            </div>

            <div class="d-flex mt-1 justify-content-between">
              <div class="form-check">
                <input
                  class="form-check-input input-primary"
                  type="checkbox"
                  id="customCheckc1"
                  checked=""
                />
                <label class="form-check-label text-muted" for="customCheckc1"
                  >Remember me</label
                >
              </div>
              <h5 class="text-secondary">
                <a href="javascript:">Forgot Password?</a>
              </h5>
            </div>

            <!-- <div *ngIf="loginError" class="alert alert-danger mt-3" role="alert">
                {{ loginError }}
            </div> -->

            <div class="d-grid mt-4">
              <button
                type="submit"
                class="btn btn-secondary"
                [disabled]="loginForm.invalid || isLoading"
              >
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                {{ isLoading ? 'Signing In...' : 'Sign In' }}
              </button>
            </div>
          </form>
          <hr />
          <h5 class="d-flex justify-content-center">
            <a [routerLink]="['/auth/register']">Don't have an account?</a>
          </h5>
        </div>
      </div>
    </div>
  </div>
</div>
