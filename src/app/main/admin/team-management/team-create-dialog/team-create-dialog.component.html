<p-dialog [(visible)]="visible" (onHide)="closeDialog()" header="Create Team" [modal]="true"
  [style]="{ width: '700px' }">

  <form [formGroup]="createForm" (ngSubmit)="submit()">

    <!-- Team Information -->
    <h5 class="mb-3">Team Information</h5>
    <div class="mb-3">
      <label class="form-label">Team Name</label>
      <input type="text" class="form-control" formControlName="name" placeholder="Team Name"
        [class.is-invalid]="f['name'].invalid && (f['name'].touched || f['name'].dirty)">
      <div class="text-danger mt-1" *ngIf="f['name'].invalid && (f['name'].touched || f['name'].dirty)">
        Team name is required.
      </div>
    </div>

    <!-- Leadership -->
    <h5 class="mb-3">Leadership</h5>

    <!-- Lead -->
    <div class="mb-3">
      <label class="form-label">Lead</label>
      <select class="form-select" formControlName="leadId"
        [class.is-invalid]="f['leadId'].invalid && f['leadId'].touched">
        <option value="" disabled>Select Lead</option>
        <option *ngFor="let emp of employees" [value]="emp.id">
          {{ emp.fullName }}
        </option>
      </select>
      <div class="text-danger mt-1" *ngIf="f['leadId'].invalid && f['leadId'].touched">
        Team Lead is required.
      </div>
    </div>


    <!-- Team Members -->
    <h5 class="mb-3">Team Members</h5>

   <!-- Team Members Dropdown -->
<div class="mb-3 d-flex gap-2 align-items-start">
  <select class="form-select" [(ngModel)]="selectedMemberToAdd" [ngModelOptions]="{standalone: true}">
    <option value="" disabled>Select Employee</option>
    
    <option *ngFor="let emp of employees" 
            [value]="emp.id"
            [disabled]="emp.id === f['leadId'].value"> <!-- Disable if already Lead -->
      {{ emp.fullName }} {{ emp.id === f['leadId'].value ? '(Lead)' : '' }}
    </option>
    
  </select>
  <button type="button" class="btn btn-outline-secondary" 
          [disabled]="!selectedMemberToAdd"
          (click)="addMember(selectedMemberToAdd)">
    Add
  </button>
</div>


    <!-- Selected Members -->
    <div class="mb-3" *ngIf="selectedMembers.length > 0">
      <div class="d-flex flex-wrap gap-2">
        <span class="badge bg-secondary d-flex align-items-center" *ngFor="let member of selectedMembers">
          {{ getEmployeeNameById(member) }}
          <button type="button" class="btn-close btn-close-white btn-sm ms-1" (click)="removeMember(member)"></button>
        </span>
      </div>
    </div>
    <div class="text-danger mt-1" *ngIf="selectedMembers.length === 0 && submitted">
      At least one team member is required.
    </div>

    <!-- Footer -->
    <div class="d-flex justify-content-end gap-2 mt-4">
      <button type="button" class="btn btn-light" (click)="closeDialog()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting()">
        <span *ngIf="isSubmitting()" class="spinner-border spinner-border-sm me-2"></span>
        {{ isSubmitting() ? 'Creating...' : 'Create Team' }}
      </button>
    </div>

  </form>
</p-dialog>
