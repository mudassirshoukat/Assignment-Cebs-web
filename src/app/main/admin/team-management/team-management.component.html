  <p-card class="flex flex-column md:flex-row md:align-items-center justify-content-between gap-3 mb-4">
    <div>
      <h2 class="text-2xl font-semibold m-0">Teams</h2>
      <p class="text-color-secondary m-0 mt-1">Manage and organize your teams</p>
    </div>
    <div class="flex gap-2">
      <p-button 
        label="New Team" 
        icon="pi pi-plus" 
        severity="primary"
        [raised]="true"
        (onClick)="openNew()"
        class="shadow-sm"
      />
    </div>
  </p-card>
<p-card>
<p-table #dt [value]="teams()" [lazy]="true" [paginator]="true" [rows]="teamService.pageSize()"
  [totalRecords]="teamService.totalCount()" [first]="(teamService.pageNumber() - 1) * teamService.pageSize()"
  [loading]="isLoading()" dataKey="id" [rowHover]="true" [tableStyle]="{ 'min-width': '70rem' }"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords} teams" [showCurrentPageReport]="true"
  [rowsPerPageOptions]="[5, 10, 20]" (onPage)="onPageChange($event)">

  <!-- Caption / Search -->
  <ng-template #caption>
    <div class="flex justify-content-end">
      <span class="p-input-icon-left">
        <i class="pi pi-search"></i>
        <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Search by team name..." />
      </span>
    </div>
  </ng-template>

  <!-- Header -->
  <ng-template #header>
    <tr>
      <th>
        Name
      </th>


      <th>
        Created On
      </th>

      <th style="min-width: 14rem">Actions</th>
    </tr>
  </ng-template>

  <!-- Body -->
  <ng-template #body let-team>
    <tr>
      <td class="fw-semibold">
        {{ team.name }}
      </td>

   

      <td>
        {{ team.createdOn | date: 'MMM dd, yyyy' }}
      </td>

    <td>
                <button pButton type="button" icon="pi pi-ellipsis-v" [outlined]="true" (click)="showMenu($event, team, menu)"></button>
                <!-- Reference the menu with a local template variable #menu -->
                <p-menu #menu [model]="items" [popup]="true" [appendTo]="'body'"></p-menu>
            </td>



    </tr>
  </ng-template>

</p-table>

<app-team-create-dialog [(visible)]="isCreateDialogOpen"
  (teamCreated)="onTeamCreated()"></app-team-create-dialog>

<app-team-update-dialog [visible]="isUpdateDialogOpen()" [team]="selectedTeamToEdit()"
  (teamUpdated)="onTeamUpdated()" (visibleChange)="onUpdateDialogHide()"></app-team-update-dialog>

<p-confirmdialog [style]="{ width: '450px' }"></p-confirmdialog>

</p-card>
