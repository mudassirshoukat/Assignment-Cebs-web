<!-- Header Card -->
<p-card class="flex flex-column md:flex-row md:align-items-center justify-content-between gap-3">
  <div>
    <h2 class="text-2xl font-semibold m-0">Job Titles</h2>
    <p class="text-color-secondary m-0 mt-1">
      Manage job titles and their department mappings
    </p>
  </div>

  <!-- Filters -->
  <div class="flex align-items-center gap-2">
    <p-dropdown
      [options]="departmentsForFilter"
      [(ngModel)]="selectedDepartmentFilter"
      optionLabel="name"
      optionValue="id"
      placeholder="Select Department"
      (onChange)="onDepartmentFilterChange()">
    </p-dropdown>

    <button
      pButton
      icon="pi pi-plus"
      label="New Job Title"
      class="p-button-sm"
      (click)="openNew()">
    </button>
  </div>
</p-card>

<!-- Table Card -->
<div class="mt-3">
  <p-card>
    <p-table
      #dt
      [value]="jobtitles()"
      [lazy]="true"
      [paginator]="true"
      [rows]="jobtitleService.pageSize()"
      [totalRecords]="jobtitleService.totalCount()"
      [first]="(jobtitleService.pageNumber() - 1) * jobtitleService.pageSize()"
      [loading]="isLoading()"
      dataKey="publicId"
      [rowHover]="true"
      [tableStyle]="{ 'min-width': '70rem' }"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} job titles"
      [showCurrentPageReport]="true"
      [rowsPerPageOptions]="[5, 10, 20]"
      (onPage)="onPageChange($event)">

      <!-- Header -->
      <ng-template pTemplate="header">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Description</th>
          <th>Status</th>
          <th style="min-width: 14rem">Actions</th>
        </tr>
      </ng-template>

      <!-- Body -->
      <ng-template pTemplate="body" let-jobtitle>
        <tr>
          <td class="fw-semibold">{{ jobtitle.publicId }}</td>

          <td class="fw-semibold">{{ jobtitle.name }}</td>

          <td
            class="text-muted description-cell"
            [pTooltip]="jobtitle.description"
            tooltipPosition="top">
            {{ jobtitle.description || '-' }}
          </td>

          <td>
            <p-tag
              [value]="jobtitle.isActive ? 'Active' : 'Inactive'"
              [severity]="jobtitle.isActive ? 'success' : 'danger'">
            </p-tag>
          </td>

          <td class="flex gap-2">
            <button
              pButton
              icon="pi pi-eye"
              [outlined]="true"
              (click)="viewJobTitleDetails(jobtitle)">
            </button>

            <button
              pButton
              icon="pi pi-pencil"
              (click)="editJobTitle(jobtitle)">
            </button>
          </td>
        </tr>
      </ng-template>

    </p-table>

    <!-- Create Dialog -->
    <app-jobtitle-create-dialog
      [(visible)]="isCreateDialogOpen"
      (jobtitleCreated)="onJobTitleCreated()">
    </app-jobtitle-create-dialog>

    <!-- Update Dialog -->
    <app-jobtitle-update-dialog
      [visible]="isUpdateDialogOpen()"
      [jobtitle]="selectedJobTitleToEdit()"
      (jobtitleUpdated)="onJobTitleUpdated()"
      (visibleChange)="onUpdateDialogHide()">
    </app-jobtitle-update-dialog>

  </p-card>
</div>
