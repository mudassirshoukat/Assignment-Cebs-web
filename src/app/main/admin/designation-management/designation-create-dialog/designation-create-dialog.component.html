<p-dialog [(visible)]="visible" (onHide)="closeDialog()" header="Create Designation"
          [modal]="true" [style]="{ width: '650px' }" [closable]="!isSubmitting">

  <form [formGroup]="createForm" (ngSubmit)="onSubmit()" class="p-fluid">

    <!-- Basic Information -->
    <h5 class="mb-3">Basic Information</h5>

    <!-- Designation Name -->
    <div class="field mb-3">
      <label class="form-label fw-semibold">Designation Name *</label>
      <input type="text" pInputText formControlName="name"
             placeholder="e.g., Senior Developer, Project Manager"
             [class.is-invalid]="f['name'].invalid && (f['name'].touched || submitted)">
      <div class="text-danger mt-1 small" *ngIf="f['name'].invalid && (f['name'].touched || submitted)">
        <span *ngIf="f['name'].errors?.['required']">Designation name is required</span>
        <span *ngIf="f['name'].errors?.['maxlength']">Maximum 100 characters allowed</span>
      </div>
    </div>

    <!-- Level -->
    <div class="field mb-3">
      <label class="form-label fw-semibold">Level *</label>
      <p-dropdown 
        formControlName="level"
        [options]="levelOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select Level"
        [style]="{width:'100%'}">
      </p-dropdown>
    </div>

    <!-- Rank -->
    <div class="field mb-3">
      <label class="form-label fw-semibold">Rank *</label>
      <p-dropdown 
        formControlName="rank"
        [options]="rankOptions"
        placeholder="Select Rank"
        [style]="{width:'100%'}">
        <ng-template pTemplate="item" let-rank>
          Rank {{ rank }}
        </ng-template>
      </p-dropdown>

      <!-- Shift Lower Ranks -->
      <div class="form-check mt-2">
        <p-checkbox
          formControlName="shiftRanksDown"
          binary="true"
          inputId="shiftRanksDown">
        </p-checkbox>
        <label class="form-check-label ms-2" for="shiftRanksDown">
          Shift all lower ranks down to make room
        </label>
      </div>

      <!-- Single Seat -->
      <div class="form-check mt-2">
        <p-checkbox
          formControlName="isSingleSeat"
          binary="true"
          inputId="isSingleSeat">
        </p-checkbox>
        <label class="form-check-label ms-2" for="isSingleSeat">
          Only one employee can hold this designation in the organization
        </label>
      </div>
    </div>

    <!-- Description -->
    <div class="form-floating mb-4">
      <textarea class="form-control" id="description" formControlName="description"
                placeholder="Brief description of this designation's role and responsibilities..."
                style="height: 100px; resize: vertical;"
                [ngClass]="{'is-invalid': f['description'].invalid && (f['description'].dirty || f['description'].touched)}">
      </textarea>
      <label for="description">Optional. Max 500 characters.</label>
      <div class="invalid-feedback" *ngIf="f['description'].invalid && (f['description'].dirty || f['description'].touched)">
        <div *ngIf="f['description'].errors?.['maxlength']">Maximum 500 characters allowed.</div>
      </div>
    </div>

    <!-- Permissions -->
    <h5 class="mb-3">Permissions & Authority</h5>
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="form-check mb-2" *ngFor="let perm of ['canBeProjectManager','canBeTeamLead','canApproveTasks','canAssignTasks']">
          <p-checkbox [formControlName]="perm" [binary]="true" [inputId]="perm"></p-checkbox>
          <label class="form-check-label ms-2" [for]="perm">
            {{ formatPermissionLabel(perm) }}
          </label>
        </div>
      </div>
      <div class="col-md-6">
        <div class="form-check mb-2" *ngFor="let perm of ['canManageTeam','canManageProjects','canManageEmployees','canReviewReports']">
          <p-checkbox [formControlName]="perm" [binary]="true" [inputId]="perm"></p-checkbox>
          <label class="form-check-label ms-2" [for]="perm">
            {{ formatPermissionLabel(perm) }}
          </label>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
      <button type="button" pButton label="Cancel" class="p-button-outlined p-button-secondary"
              (click)="closeDialog()" [disabled]="isSubmitting"></button>
              
      <button type="submit" pButton [label]="isSubmitting ? 'Creating...' : 'Create Designation'"
              class="p-button-primary" [disabled]="isSubmitting || createForm.invalid">
        <i *ngIf="isSubmitting" class="pi pi-spinner pi-spin me-2"></i>
      </button>
    </div>

  </form>
</p-dialog>
