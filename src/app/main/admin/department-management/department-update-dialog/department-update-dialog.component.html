<p-dialog
  [(visible)]="visible"
  (onHide)="closeDialog()"
  [style]="{ width: '800px' }"
  header="Update Department"
  [modal]="true"
>

  <form [formGroup]="updateForm" (ngSubmit)="submitUpdate()">

    <!-- Department Name -->
    <div class="form-floating mb-3">
      <input
        type="text"
        class="form-control"
        id="departmentName"
        formControlName="name"
        placeholder="Department Name"
        [ngClass]="{
          'is-invalid':
            updateForm.get('name')?.invalid &&
            (updateForm.get('name')?.dirty || updateForm.get('name')?.touched)
        }"
      />
      <label for="departmentName">Department Name</label>

      <div
        class="invalid-feedback"
        *ngIf="
          updateForm.get('name')?.invalid &&
          (updateForm.get('name')?.dirty || updateForm.get('name')?.touched)
        "
      >
        <div *ngIf="updateForm.get('name')?.errors?.['required']">
          Department name is required.
        </div>
      </div>
    </div>

    <!-- Department Description -->
    <div class="form-floating mb-4">
      <textarea
        class="form-control"
        id="departmentDescription"
        formControlName="description"
        placeholder="Department Description"
        style="height: 200px; min-height: 100px; resize: vertical"
        [ngClass]="{
          'is-invalid':
            updateForm.get('description')?.invalid &&
            (updateForm.get('description')?.dirty ||
              updateForm.get('description')?.touched)
        }"
      ></textarea>
      <label for="departmentDescription">Department Description</label>

      <div
        class="invalid-feedback"
        *ngIf="
          updateForm.get('description')?.invalid &&
          (updateForm.get('description')?.dirty ||
            updateForm.get('description')?.touched)
        "
      >
        <div *ngIf="updateForm.get('description')?.errors?.['required']">
          Department description is required.
        </div>
      </div>
    </div>

    <!-- Footer Buttons -->
    <div class="d-flex justify-content-end gap-2">
      <button
        type="button"
        class="btn btn-light"
        (click)="closeDialog()"
      >
        Cancel
      </button>

      <button
        type="submit"
        class="btn btn-secondary"
        [disabled]="updateForm.invalid || isSubmitting()"
      >
        <span
          *ngIf="isSubmitting()"
          class="spinner-border spinner-border-sm me-2"
          role="status"
        ></span>
        {{ isSubmitting() ? 'Updating...' : 'Update Department' }}
      </button>
    </div>

  </form>
</p-dialog>
