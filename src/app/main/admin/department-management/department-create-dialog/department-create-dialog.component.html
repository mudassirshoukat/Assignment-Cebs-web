<p-dialog 
  [(visible)]="visible" 
  (onHide)="closeDialog()" 
  [style]="{ width: '800px' }" 
  header="Create Department"
  [modal]="true">

  <form [formGroup]="createForm" (ngSubmit)="submit()">

    <!-- Department Name -->
    <div class="form-floating mb-3">
      <input 
        type="text" 
        class="form-control" 
        id="departmentName" 
        formControlName="name" 
        placeholder="Department Name"
        [ngClass]="{
          'is-invalid': createForm.get('name')?.invalid &&
                        (createForm.get('name')?.dirty || createForm.get('name')?.touched)
        }" />
      <label for="departmentName">Department Name</label>

      <div class="invalid-feedback" *ngIf="
          createForm.get('name')?.invalid &&
          (createForm.get('name')?.dirty || createForm.get('name')?.touched)
        ">
        <div *ngIf="createForm.get('name')?.errors?.['required']">
          Department name is required.
        </div>
      </div>
    </div>

    <!-- Department Description -->
    <div class="form-floating mb-4">
      <textarea 
        class="form-control" 
        id="departmentDescription" 
        formControlName="description"
        placeholder="Department Description" 
        style="height: 200px; min-height: 100px; resize: vertical;" 
        [ngClass]="{
          'is-invalid': createForm.get('description')?.invalid &&
                        (createForm.get('description')?.dirty || createForm.get('description')?.touched)
        }"></textarea>
      <label for="departmentDescription">Department Description</label>

      <div class="invalid-feedback" *ngIf="
          createForm.get('description')?.invalid &&
          (createForm.get('description')?.dirty || createForm.get('description')?.touched)
        ">
        <div *ngIf="createForm.get('description')?.errors?.['required']">
          Department description is required.
        </div>
      </div>
    </div>

    <!-- Footer Buttons -->
    <div class="d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-light" (click)="closeDialog()">
        Cancel
      </button>

      <button type="submit" class="btn btn-secondary" [disabled]="createForm.invalid || isSubmitting()">
        <span *ngIf="isSubmitting()" class="spinner-border spinner-border-sm me-2" role="status"></span>
        {{ isSubmitting() ? 'Creating...' : 'Create Department' }}
      </button>
    </div>

  </form>
</p-dialog>
