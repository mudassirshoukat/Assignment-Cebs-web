<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-auto col-lg-auto">
        <div class="h-screen w-screen flex align-items-center justify-content-center p-4">
            <div class="card shadow-2 border-round-2xl w-full" style="max-width: 400px; min-height: 500px;">
                <div class="flex flex-column align-items-center justify-content-center h-full p-5 text-center">

                    <div class="border-circle w-5rem h-5rem flex align-items-center justify-content-center mb-4"
                        style="background: linear-gradient(135deg, rgba(239, 68, 68, 0.3) 0%, rgba(239, 68, 68, 0) 70%);">
                        <div
                            class="bg-red-500 border-circle w-4rem h-4rem flex align-items-center justify-content-center">
                            <i class="pi pi-exclamation-triangle text-white text-2xl"></i>
                        </div>
                    </div>

                    <h2 class="text-900 font-bold text-3xl mb-3">Server Error</h2>

                    <p class="text-600 text-lg mb-4 line-height-3">
                        Something went wrong on our servers. Please try again later.
                    </p>

                    <div class="my-4">
                        <img src="assets/images/servererror.jpg" alt="Server error"
                            class="mb-8" width="80%" />
                    </div>

                    <p class="text-500 mb-5">
                        Our team has been notified and is working on the issue.
                    </p>

                    <p-button label="Try Again" (onClick)="reloadPage()" styleClass="p-button-danger"
                        icon="pi pi-refresh">
                    </p-button>

                    <div class="mt-4">
                        <a class="text-red-500 hover:underline cursor-pointer text-sm" [routerLink]="['/']">
                            <i class="pi pi-home mr-2"></i>
                            Go to Homepage
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
