<div class="row justify-content-center align-items-center min-vh-100">
    <div class=" col-md-auto col-lg-auto">
        <div class="h-screen w-screen flex align-items-center justify-content-center p-4">
            <div class="card shadow-2 border-round-2xl w-full" style="max-width: 400px; min-height: 500px;">
                <div class="flex flex-column align-items-center justify-content-center h-full p-5 text-center">

                    <div class="border-circle w-5rem h-5rem flex align-items-center justify-content-center mb-4"
                        style="background: linear-gradient(135deg, rgba(247, 149, 48, 0.3) 0%, rgba(247, 149, 48, 0) 70%);">
                        <div
                            class="bg-orange-500 border-circle w-4rem h-4rem flex align-items-center justify-content-center">
                            <i class="pi pi-lock text-white text-2xl"></i>
                        </div>
                    </div>

                    <h2 class="text-900 font-bold text-3xl mb-3">Access Denied</h2>

                    <p class="text-600 text-lg mb-4 line-height-3">
                        You do not have the necessary permissions to access this resource.
                    </p>

                    <div class="my-4">
                        <img src="assets/images/accessdenied.png" alt="Access denied"
                            class="mb-8" width="80%" />
                    </div>

                    <p class="text-500 mb-5">
                        Please contact your system administrator if you believe this is an error.
                    </p>

                    <p-button label="Go to Dashboard" [routerLink]="['/']" styleClass="p-button-warning"
                        icon="pi pi-home">
                    </p-button>

                    <div class="mt-4">
                        <a class="text-orange-500 hover:underline cursor-pointer text-sm">
                            <i class="pi pi-envelope mr-2"></i>
                            Contact Support
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
