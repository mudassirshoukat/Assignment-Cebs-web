<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-auto col-lg-auto">
        <div class="h-screen w-screen flex align-items-center justify-content-center p-4">
            <div class="card shadow-2 border-round-2xl w-full" style="max-width: 400px; min-height: 500px;">
                <div class="flex flex-column align-items-center justify-content-center h-full p-5 text-center">

                    <div class="border-circle w-5rem h-5rem flex align-items-center justify-content-center mb-4"
                        style="background: linear-gradient(135deg, rgba(59, 130, 246, 0.3) 0%, rgba(59, 130, 246, 0) 70%);">
                        <div
                            class="bg-blue-500 border-circle w-4rem h-4rem flex align-items-center justify-content-center">
                            <i class="pi pi-search text-white text-2xl"></i>
                        </div>
                    </div>

                    <h2 class="text-900 font-bold text-3xl mb-3">Page Not Found</h2>

                    <p class="text-600 text-lg mb-4 line-height-3">
                        The page you are looking for doesn't exist or has been moved.
                    </p>

                    <div class="my-4">
                        <img src="assets/images/notfound.png" alt="Page not found"
                            class="mb-8" width="80%" />
                    </div>

                    <p class="text-500 mb-5">
                        Check the URL or navigate back to home.
                    </p>

                    <p-button label="Go to Home" [routerLink]="['/']" styleClass="p-button-primary"
                        icon="pi pi-home">
                    </p-button>

                    <div class="mt-4">
                        <a class="text-blue-500 hover:underline cursor-pointer text-sm" [routerLink]="['/']">
                            <i class="pi pi-arrow-left mr-2"></i>
                            Back to Previous Page
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
