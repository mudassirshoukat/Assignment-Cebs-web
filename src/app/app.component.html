<!-- Global Dialog -->
<app-global-dialog
  *ngIf="dialogService.dialog$ | async as dialog"
  [visible]="dialog.visible"
  [title]="dialog.title!"
  [message]="dialog.message!"
  [errors]="dialog.errors!"
  [type]="dialog.type">
</app-global-dialog>
